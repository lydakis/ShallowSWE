schema_version = "1.2"

[task]
name = "shallowswe/ticket-state-reconcile"
description = "Reconcile a desired ticket manifest against a deterministic local ticket API state."
authors = [{ name = "George Lydakis" }]
keywords = ["shallowswe", "workflow", "large", "python", "tickets"]

[metadata]
category = "workflow"
size = "large"
language = "python"
shape = "reconcile-states"
subtype = "ticket-manifest-reconcile"
family = "local_api_operation"
maintenance_type = "adaptive"
domain = "ticketing"
source_pattern = "idempotent manifest reconciliation against API-side state with duplicates and transient retry"
contamination_notes = "abstract source pattern only; no issue text, patch, tests, filenames, or domain data copied"
repo_origin = "small_original_repo"
requires_test_authoring = false
expected_engineer_minutes = 60
expected_steps = 14
calibration_status = "candidate"
weakest_model_pass_rate = 1.0
weakest_model_rollouts = 1

[calibration]
calibration_snapshot_id = "shallowswe-v0.1-candidate-2026-07-04"
admission_decision = "candidate_pending_high_n"
size_assignment_decision = "candidate_pending_high_n_floor"
notes = "Local verifier and alternate-solution evidence are complete; high-N ceiling and floor calibration are pending."

[calibration.ceiling]
panel = "shallowswe-ceiling-v0.1"
primary_model_config = "openai/gpt-5.5[medium]"
one_shot_target_n = 16
one_shot_current_n = 1
one_shot_passes = 1
one_shot_pass_rate = 1.0
gate_pass_threshold = 0.75
decision = "needs_more_rollouts"
source_rollouts = "results/shallowswe-ceiling-smoke-gpt55-medium-n1-2026-07-04/rollouts.json"

[calibration.floor]
panel = "shallowswe-calibration-v0.1"
selected_model_config = "google/gemini-3.5-flash"
one_shot_target_n = 10
one_shot_current_n = 1
one_shot_passes = 1
one_shot_pass_rate = 1.0
size_band = "large"
decision = "needs_high_n_confirmation"
source_rollouts = "results/shallowswe-floor-probe-n1-v2-postfix-2026-07-04/rollouts.json"
evidence_artifact = "results/shallowswe-floor-probe-n1-v2-postfix-2026-07-04/task-floor-evidence.json"

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 900.0

[environment]
build_timeout_sec = 600.0
os = "linux"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = false
mcp_servers = []

[verifier.env]

